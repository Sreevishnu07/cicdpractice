name: CI-CD-Pipeline

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: checkout-code
        run: actions/checkout@v4

      - name: login to dockerhub
        run: echo "${{secrets.DOCKER_PASSWORD}}" | docker login -u "${{secrets.DOCKER_USERNAME}}" --password-stdin

      - name: build image
        run: docker build -t ${{secrets.DOCKER_USERNAME}}/my-ci-cd .

      - name: push image
        run: docker push ${{secrets.DOCKER_USERNAME}}/my-ci-cd

      - name: run container
        run: docker run -d -p 5000:5000 --name testcont ${{secrets.DOCKER_USERNAME}}/my-ci-cd

      - name: check container
        run: docker ps

      - name: logs
        run: docker logs testcont

      - name: wait for app
        run: sleep 15

      - name: stop container
        run: docker stop testcont

      - name: renove container
        run: docker rm testcont
